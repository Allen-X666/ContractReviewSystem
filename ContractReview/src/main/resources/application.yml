server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: contract-review

  # 数据源配置（生产环境通过环境变量配置）
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/contract_review?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1115}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: ContractReviewHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: SELECT 1

  # Redis配置（生产环境通过环境变量配置）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:1115}
      database: ${REDIS_DATABASE:1}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
      enabled: true

  # MVC 异步配置 - 增加超时时间以支持 SSE 流式输出
  mvc:
    async:
      request-timeout: 300000  # 5分钟，单位毫秒

  # 邮箱相关配置（生产环境通过环境变量配置）
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:1722860194@qq.com}
    password: ${MAIL_PASSWORD:ngmsgkxdkfhfdjjd}
    default-encoding: UTF-8
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: jakarta.net.ssl.SSLSocketFactory
          timeout: 30000
          connectiontimeout: 30000
        debug: false

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.contractreview.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    cache-enabled: true

#JWT 配置（全局）
jwt:
  secret: ${JWT_SECRET:asdfghjklzxcvbnmqwertyuiopasdfghjkl}
  ttl: 3600000 # 单位：毫秒    1小时
  refresh-ttl: 604800000  # 7天，单位毫秒

# FastAPI 服务配置
fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8001}
  api-prefix: /api/v1
  timeout: 120000  # 毫秒，增加到120秒
  connect-timeout: 10000  # 毫秒，增加到10秒

# 日志配置
logging:
  level:
    root: INFO
    com.example.contractreview: DEBUG
    org.springframework.web: DEBUG
    com.example.contractreview.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/contract-review.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# 自定义配置：验证码相关
verify:
  code:
    length: 6        # 验证码长度（6位数字）
    expire: 90       # 验证码过期时间（秒）
    limit: 60        # 同一邮箱发送限流（60秒内只能发1次）

# 阿里云OSS配置（生产环境通过环境变量配置）
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    bucket: ${OSS_BUCKET:allenxjl}
    region: ${OSS_REGION:cn-beijing}

# 应用版本信息配置
app:
  name: 合同审查系统
  version: 1.0.0
  frontend-version: 1.0.0
  backend-version: 1.0.0
  last-update: "2026-05-09"
  knowledge-version: "2026.05"
  ai-model: "qwen3.5"
